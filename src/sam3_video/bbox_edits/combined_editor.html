<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAILS · Annotation + BBox Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #22263a;
  --border:   #2e3348;
  --accent:   #5b8dee;
  --accent2:  #7c3aed;
  --green:    #10b981;
  --yellow:   #f59e0b;
  --red:      #ef4444;
  --orange:   #f97316;
  --text:     #e2e8f0;
  --muted:    #6b7280;
  --mono:     'JetBrains Mono', 'Fira Code', monospace;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}

.app { display: flex; flex-direction: column; min-height: 100vh; padding: 8px; gap: 6px; }

/* ── Info bar ── */
#infoBar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 14px;
  font-family: var(--mono);
  font-size: 11px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.stat-chip { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
.chip-saved   { background: #064e3b; color: var(--green); }
.chip-multi   { background: #4c1d95; color: #c4b5fd; }
.chip-single  { background: #1e3a5f; color: var(--accent); }

/* ── Top (video + bbox) full width ── */
.top-section { display: flex; flex-direction: column; gap: 6px; }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.panel-header {
  background: var(--surface2);
  padding: 6px 12px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.panel-header .dot { width: 7px; height: 7px; border-radius: 50%; }
.panel-body { padding: 8px 10px; }

/* Video sits centered, constrained height */
.video-wrap { display: flex; justify-content: center; }
video {
  background: #000;
  border-radius: 4px;
  display: block;
  max-height: 55vh;
  max-width: 100%;
}

/* ── Slider ── */
.slider-row { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
#frameLabel { font-family: var(--mono); font-size: 11px; color: var(--accent); }
input[type=range] {
  width: 100%; height: 5px; -webkit-appearance: none;
  background: var(--surface2); border-radius: 3px; outline: none;
  border: 1px solid var(--border);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}

/* ── Buttons ── */
.btn {
  padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; color: #fff; white-space: nowrap;
  transition: filter 0.15s;
}
.btn:hover:not(:disabled) { filter: brightness(1.15); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-blue   { background: var(--accent); }
.btn-green  { background: var(--green); }
.btn-purple { background: var(--accent2); }
.btn-red    { background: var(--red); }
.btn-orange { background: var(--orange); }
.btn-yellow { background: var(--yellow); color: #111; }

.speed-btn {
  padding: 3px 7px; font-size: 11px; border-radius: 4px;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
}
.speed-btn.active { background: var(--accent); border-color: var(--accent); }

.controls { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

/* ── ID cards ── */
.id-cards-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
.id-card {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 16px; cursor: pointer; font-size: 11px; font-weight: 700;
  border: 2px solid transparent; user-select: none;
}
.id-card .dot { width: 8px; height: 8px; border-radius: 50%; }
.id-card.keep   { background: #064e3b55; border-color: var(--green); color: #6ee7b7; }
.id-card.remove { background: #7f1d1d55; border-color: var(--red); color: #fca5a5; text-decoration: line-through; opacity: 0.6; }
.id-card.selected { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── BBox timeline ── */
.tl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.tl-label {
  width: 60px; text-align: right; font-size: 10px; font-weight: 700; color: var(--muted);
  cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
}
.tl-label.selected { color: var(--accent); text-decoration: underline; }
.tl-bar {
  flex: 1; position: relative; height: 22px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
}
.tl-block { position: absolute; top: 0; bottom: 0; min-width: 1px; border-radius: 2px; }
.tl-block.kept-sub { cursor: pointer; }
.tl-block.kept-sub:hover { outline: 2px solid #fff; z-index: 5; }
.tl-block.excl-sub {
  background: repeating-linear-gradient(45deg,#374151,#374151 4px,#4b5563 4px,#4b5563 8px) !important;
  opacity: 0.7 !important; cursor: pointer;
}
.tl-block.excl-sub:hover { outline: 2px solid #fff; z-index: 5; }
.tl-bp { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 8; pointer-events: none; }
.tl-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 10; pointer-events: none; }

/* ── Frame details ── */
#frameDets {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; min-height: 22px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ══════════════════════════════════════════════════════════════
   ANNOTATION SECTION — light / white theme like old tool
   ══════════════════════════════════════════════════════════════ */
.ann-section {
  background: #f9fafb;
  color: #111827;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
  padding: 14px 16px;
  margin-top: 4px;
}
.ann-head {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid #e5e7eb;
}
.ann-head h2 {
  font-size: 14px; font-weight: 700; color: #1f2937;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.ann-head .badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  background: #e0e7ff; color: #3730a3;
}
.ann-head #annStatus { font-size: 11px; color: #6b7280; margin-left: auto; }
.ann-head #annFrameLabel {
  font-family: var(--mono); font-size: 11px;
  background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 4px;
  font-weight: 700;
}

.ann-controls { display: flex; gap: 6px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.ann-btn {
  padding: 6px 14px; border-radius: 5px; font-size: 12px; font-weight: 600;
  border: 1px solid transparent; cursor: pointer;
}
.ann-btn-yellow { background: #f59e0b; color: #fff; }
.ann-btn-yellow:hover:not(:disabled) { background: #d97706; }
.ann-btn-red { background: #ef4444; color: #fff; }
.ann-btn-red:hover:not(:disabled) { background: #dc2626; }
.ann-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.ann-rows { display: flex; flex-direction: column; gap: 10px; }
.ann-row { display: flex; align-items: center; gap: 10px; }
.ann-checkbox { accent-color: #3b82f6; cursor: pointer; width: 16px; height: 16px; flex-shrink: 0; }
.ann-label {
  width: 260px; flex-shrink: 0;
  font-size: 12px; font-weight: 700; color: #2563eb;
  cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: right; padding-right: 6px;
}
.ann-label.selected { color: #d97706; }
.ann-label .ref-tag {
  display: inline-block; margin-left: 4px; padding: 1px 6px;
  font-size: 10px; font-weight: 600;
  background: #dbeafe; color: #1e40af; border-radius: 3px;
}

.ann-bar-wrap {
  flex: 1; position: relative; height: 28px;
  background: #ffffff; border: 1px solid #d1d5db; border-radius: 3px; overflow: hidden;
}
.ann-segment {
  position: absolute; top: 0; bottom: 0; min-width: 1px;
  border: 1px solid rgba(0,0,0,0.2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  overflow: hidden; box-sizing: border-box;
  padding: 0 3px;
}
.ann-segment.na-seg {
  background: repeating-linear-gradient(45deg,#d1d5db,#d1d5db 8px,#9ca3af 8px,#9ca3af 16px) !important;
  font-style: italic; color: #1f2937; text-shadow: none; opacity: 0.8;
}
.ann-marker { position: absolute; top: 0; height: 100%; width: 2px; background: #ef4444; pointer-events: none; z-index: 10; }
.ann-playhead { position: absolute; top: 0; height: 100%; width: 2px; background: #ef4444; pointer-events: none; z-index: 11; }

/* ── Label dialog ── */
#labelDialog {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  align-items: center; justify-content: center;
}
#labelDialog.open { display: flex; }
.dialog-box {
  background: #fff; color: #111827;
  border-radius: 10px; padding: 20px; max-width: 460px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.dialog-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #2563eb; }
.dialog-labels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
.dlabel-btn {
  padding: 7px 8px; border-radius: 5px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid #d1d5db; background: #f3f4f6; color: #111827;
}
.dlabel-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.dialog-footer { display: flex; gap: 8px; justify-content: flex-end; }
.dialog-footer .btn { background: #6b7280; }
.dialog-footer .btn-blue { background: #3b82f6; }

/* ── Notifications ── */
.notif {
  position: fixed; top: 16px; right: 16px; padding: 9px 18px;
  border-radius: 6px; font-weight: 700; z-index: 9999; color: #fff; font-size: 12px;
  animation: slideIn 0.25s ease-out;
}
.notif.success { background: var(--green); }
.notif.error   { background: var(--red); }
.notif.info    { background: var(--accent); }
.notif.warning { background: var(--yellow); color: #111; }
@keyframes slideIn { from { transform: translateX(300px); opacity:0; } to { transform: translateX(0); opacity:1; } }
</style>
</head>
<body>
<div class="app">

  <!-- Info bar -->
  <div id="infoBar">Loading…</div>

  <!-- TOP: video + bbox, full width -->
  <div class="top-section">

    <!-- Video panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:#ef4444"></div>
        VIDEO PLAYER
        <span id="fpsTag" style="margin-left:auto;font-size:10px;color:var(--muted)"></span>
      </div>
      <div class="panel-body">
        <div class="video-wrap">
          <video id="videoPlayer" preload="auto"></video>
        </div>
        <div class="slider-row">
          <div id="frameLabel">Frame: 0 / 0</div>
          <input type="range" id="slider" min="0" max="0" value="0" step="1">
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-blue"   id="prevBtn">◀ Prev</button>
      <button class="btn btn-blue"   id="nextBtn">Next ▶</button>
      <button class="btn btn-purple" id="skipBtn">⏭ Skip Unprocessed</button>
      <button class="btn btn-blue"   id="loadBtn">Load Video</button>
      <button class="btn btn-green"  id="playBtn" disabled>▶ Play</button>
      <div style="display:flex;gap:2px">
        <button class="speed-btn" data-speed="0.25">0.25x</button>
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2">2x</button>
      </div>
      <button class="btn btn-orange" id="bpBboxBtn"  disabled>+ BBox BP</button>
      <button class="btn btn-red"    id="clearBboxBpBtn" disabled>Clear BBox BPs</button>
      <button class="btn btn-green"  id="saveBtn"   disabled>💾 Save All</button>
    </div>

    <!-- ID cards -->
    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:var(--green)"></div>
        TRACKED IDs — click to toggle keep/remove
      </div>
      <div class="panel-body">
        <div id="idCards" class="id-cards-wrap"></div>
      </div>
    </div>

    <!-- BBox Timeline -->
    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:var(--accent)"></div>
        BBOX TIMELINE (source frames) — click label to select ID · click segment to exclude
      </div>
      <div class="panel-body">
        <div id="tlRows"></div>
      </div>
    </div>

    <!-- Frame details -->
    <div id="frameDets">—</div>

  </div><!-- /top-section -->

  <!-- BOTTOM: Annotations (light theme) -->
  <div class="ann-section">
    <div class="ann-head">
      <h2>Annotations</h2>
      <span class="badge">15 FPS</span>
      <span id="annFrameLabel">Ann frame: 0 / 0</span>
      <span id="annStatus">—</span>
    </div>

    <div class="ann-controls">
      <button class="ann-btn ann-btn-yellow" id="bpAnnBtn" disabled>+ Ann Breakpoint</button>
      <button class="ann-btn ann-btn-red"    id="clearAnnBpBtn" disabled>Clear Ann BPs</button>
      <span style="font-size:11px;color:#6b7280">
        Shortcuts: <b>Space</b> play · <b>← →</b> step · <b>b</b> bbox BP · <b>n</b> ann BP
      </span>
    </div>

    <div class="ann-rows" id="annRows"></div>
  </div>

</div><!-- /app -->

<!-- Label Dialog -->
<div id="labelDialog">
  <div class="dialog-box">
    <div class="dialog-title" id="dialogTitle"></div>
    <div class="dialog-labels" id="dialogLabels"></div>
    <div class="dialog-footer">
      <button class="btn btn-blue"  id="dialogNA">N/A</button>
      <button class="btn" id="dialogCancel">Cancel</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════
const COLORS = ['#22c55e','#3b82f6','#eab308','#ec4899','#f97316','#06b6d4','#8b5cf6','#14b8a6','#f43f5e','#84cc16'];

let config = {};
let videos = [], vidIdx = 0;
let loaded = false, playing = false, speed = 1;

// Frame spaces
let srcFps = 30;           // video playback fps
let annFps = 15;           // annotation fps
let outFps = 15;           // bbox output fps
let totalSrcFrames = 0;    // video length in source frames
let totalAnnFrames = 0;    // annotation row count (15-fps)
let srcFrame = 0;          // current src-fps frame

// BBox state (source-fps)
let detData = null;
let idStates = {};
let bpById   = {};
let exclById = {};
let idFrameSets = {};
let selectedBboxId = null;

// Annotation state (15-fps)
let annData = {};
let selectedAnnCat = null;
let currentSegment = null;

const vid = document.getElementById('videoPlayer');
const slider = document.getElementById('slider');
const frameLbl = document.getElementById('frameLabel');
const annFrameLbl = document.getElementById('annFrameLabel');

// ════════════════════════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════════════════════════
function notify(msg, type='info', dur=2000) {
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.animation='slideIn 0.25s reverse'; setTimeout(()=>el.remove(),250); }, dur);
}

function srcToAnn(f) { return Math.floor(f * annFps / srcFps); }
function annToSrc(f) { return Math.round(f * srcFps / annFps); }

// ════════════════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════════════════
async function init() {
  const [cfgRes, vidRes] = await Promise.all([fetch('/api/config'), fetch('/api/videos')]);
  config = await cfgRes.json();
  const vdata = await vidRes.json();
  videos = vdata.videos;
  outFps = config.output_fps || 15;
  annFps = config.ann_fps || 15;

  for (const cat of Object.keys(config.all_categories)) {
    annData[cat] = { breakpoints: [], segments: [] };
  }
  if (config.action_categories) {
    selectedAnnCat = Object.keys(config.action_categories)[0];
  }

  renderInfoBar(vdata);
  renderAnnPanel();
  setupEvents();
  updateInfoBar();

  const ur = await fetch('/api/first-unprocessed');
  const ud = await ur.json();
  if (ud.found) { vidIdx = ud.index; updateInfoBar(); }
}

// ════════════════════════════════════════════════════════════════
// Info bar
// ════════════════════════════════════════════════════════════════
function renderInfoBar(stats) {
  const s = stats || {};
  document.getElementById('infoBar').innerHTML = `
    <span style="color:var(--muted)">SAILS Annotation + BBox Editor</span>
    <span class="stat-chip chip-saved">✓ ${s.saved||0} saved</span>
    <span class="stat-chip chip-multi">⚠ ${s.multi_id_unsaved||0} multi-ID</span>
    <span class="stat-chip chip-single">○ ${s.single_id_unsaved||0} single-ID</span>
  `;
}

function updateInfoBar() {
  if (!videos.length) return;
  const v = videos[vidIdx];
  const statusHtml = v.status === 1
    ? '<span style="color:var(--green);font-weight:700">✓ Saved</span>'
    : '<span style="color:var(--red);font-weight:700">⚠ Unprocessed</span>';

  document.getElementById('infoBar').innerHTML = `
    <b style="color:var(--accent)">${vidIdx+1}/${videos.length}</b>
    ${statusHtml}
    <span class="stat-chip chip-multi">IDs: ${v.unique_ids.length}</span>
    ${v.bbox_saved ? '<span class="stat-chip chip-saved">BBox ✓</span>' : ''}
    <span style="font-family:var(--mono);font-size:11px;color:var(--text);background:var(--surface2);padding:2px 8px;border-radius:4px;margin-left:auto;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
      title="${v.stem}">📹 ${v.stem}</span>
  `;

  updateAnnLabels();
}

function updateAnnLabels() {
  if (!videos.length) return;
  const v = videos[vidIdx];
  for (const cat of Object.keys(config.action_categories || {})) {
    const el = document.getElementById(`ann-label-${cat}`);
    if (!el) continue;
    const val = v.category_values[cat] || '';
    const name = cat.replace(/_/g,' ');
    el.innerHTML = val
      ? `${name} <span class="ref-tag">${val}</span>`
      : name;
  }
}

// ════════════════════════════════════════════════════════════════
// Events
// ════════════════════════════════════════════════════════════════
function setupEvents() {
  document.getElementById('prevBtn').onclick = () => { if(vidIdx>0){vidIdx--;updateInfoBar();resetUI();} };
  document.getElementById('nextBtn').onclick = () => { if(vidIdx<videos.length-1){vidIdx++;updateInfoBar();resetUI();} };
  document.getElementById('skipBtn').onclick = skipUnprocessed;
  document.getElementById('loadBtn').onclick = loadVideo;
  document.getElementById('playBtn').onclick = togglePlay;
  document.getElementById('saveBtn').onclick = saveAll;
  document.getElementById('bpBboxBtn').onclick = addBboxBreakpoint;
  document.getElementById('bpAnnBtn').onclick  = addAnnBreakpoint;
  document.getElementById('clearBboxBpBtn').onclick = clearBboxBreakpoints;
  document.getElementById('clearAnnBpBtn').onclick  = clearAnnBreakpoints;

  slider.oninput = () => {
    if (!loaded) return;
    srcFrame = parseInt(slider.value);
    vid.currentTime = srcFrame / srcFps;
    updateFrame();
  };
  vid.ontimeupdate = () => {
    if (!loaded) return;
    srcFrame = Math.floor(vid.currentTime * srcFps);
    slider.value = srcFrame;
    updateFrame();
    if (playing && srcFrame >= totalSrcFrames - 1) stopPlay();
  };

  document.querySelectorAll('.speed-btn').forEach(b => {
    b.onclick = () => {
      speed = parseFloat(b.dataset.speed);
      if (playing) vid.playbackRate = speed;
      document.querySelectorAll('.speed-btn').forEach(x => x.classList.toggle('active', x===b));
    };
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); seekF(e.shiftKey ? -10 : -1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); seekF(e.shiftKey ?  10 :  1); }
    if (e.key === 'b')          { e.preventDefault(); addBboxBreakpoint(); }
    if (e.key === 'n')          { e.preventDefault(); addAnnBreakpoint(); }
  });

  document.getElementById('dialogCancel').onclick = closeDialog;
  document.getElementById('dialogNA').onclick = () => setSegmentLabel('N/A');
}

// ════════════════════════════════════════════════════════════════
// Reset / Load video
// ════════════════════════════════════════════════════════════════
function resetUI() {
  if (playing) stopPlay();
  loaded = false; detData = null; idStates = {};
  bpById = {}; exclById = {}; idFrameSets = {}; selectedBboxId = null;
  for (const cat of Object.keys(config.all_categories||{})) {
    annData[cat] = { breakpoints: [], segments: [] };
  }
  vid.removeAttribute('src'); vid.load();
  slider.max = 0; slider.value = 0;
  frameLbl.textContent = 'Frame: 0 / 0';
  annFrameLbl.textContent = 'Ann frame: 0 / 0';
  document.getElementById('idCards').innerHTML = '';
  document.getElementById('tlRows').innerHTML  = '';
  document.getElementById('frameDets').textContent = '—';
  document.getElementById('fpsTag').textContent = '';
  document.getElementById('annStatus').textContent = '—';
  ['playBtn','saveBtn','bpBboxBtn','bpAnnBtn','clearBboxBpBtn','clearAnnBpBtn'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
  renderAnnPanel();
}

async function loadVideo() {
  if (!videos.length) return;
  const loadBtn = document.getElementById('loadBtn');
  loadBtn.textContent = 'Loading…'; loadBtn.disabled = true;

  try {
    if (playing) stopPlay();

    const [detRes, annRes] = await Promise.all([
      fetch(`/api/detections/${vidIdx}`),
      fetch(`/api/annotations/${vidIdx}`),
    ]);
    detData = await detRes.json();
    const annPayload = await annRes.json();

    srcFps = detData.fps || 30;
    outFps = detData.output_fps || 15;
    annFps = annPayload.ann_fps || 15;
    document.getElementById('fpsTag').textContent =
      `src ${srcFps.toFixed(2)} fps · bbox → ${outFps} fps · ann → ${annFps} fps`;

    // BBox state (source-fps)
    idStates = {}; bpById = {}; exclById = {}; idFrameSets = {};
    detData.unique_ids.forEach(id => {
      idStates[id] = 'keep';
      bpById[id]   = [];
      exclById[id] = new Set();
      idFrameSets[id] = new Set();
    });
    for (const [fStr, dets] of Object.entries(detData.per_frame || {})) {
      const f = parseInt(fStr);
      for (const d of dets) {
        if (idFrameSets[d.obj_id]) idFrameSets[d.obj_id].add(f);
      }
    }
    if (detData.unique_ids.length > 0) selectedBboxId = detData.unique_ids[0];

    // Annotation state (15-fps)
    for (const cat of Object.keys(config.all_categories || {})) {
      annData[cat] = { breakpoints: [], segments: [] };
    }
    let existingAnnRows = 0;
    if (annPayload.found && annPayload.categories) {
      existingAnnRows = annPayload.ann_total_frames || 0;
      for (const [cat, cd] of Object.entries(annPayload.categories)) {
        annData[cat] = {
          breakpoints: cd.breakpoints || [],
          segments: (cd.segments || []).map(s => ({
            start_frame: s.start_frame,
            end_frame:   s.end_frame,
            label: s.label && s.label.trim() ? s.label : 'N/A',
          }))
        };
      }
      document.getElementById('annStatus').textContent = `✓ loaded (${existingAnnRows} rows)`;
    } else {
      document.getElementById('annStatus').textContent = '○ no existing annotations';
    }

    // Load video file
    await new Promise((res, rej) => {
      vid.src = `/api/video_file/${vidIdx}`;
      const to = setTimeout(() => rej(new Error('Video load timeout')), 60000);
      vid.onloadedmetadata = () => {
        clearTimeout(to);
        totalSrcFrames = Math.floor(vid.duration * srcFps);
        // Use existing ann rows if present, else derive from video duration
        totalAnnFrames = existingAnnRows > 0
          ? existingAnnRows
          : Math.floor(vid.duration * annFps);
        slider.max = totalSrcFrames - 1;
        slider.value = 0;
        srcFrame = 0;
        loaded = true;
        res();
      };
      vid.onerror = () => { clearTimeout(to); rej(new Error('Video load failed')); };
    });

    // If no existing annotations, seed each action category with one N/A covering full range
    if (!annPayload.found) {
      for (const cat of Object.keys(config.action_categories || {})) {
        annData[cat] = {
          breakpoints: [],
          segments: [{start_frame: 0, end_frame: totalAnnFrames, label: 'N/A'}]
        };
      }
    }

    renderIdCards();
    renderBboxTimeline();
    renderAllAnnSegments();
    updateFrame();

    ['playBtn','saveBtn','bpBboxBtn','bpAnnBtn','clearBboxBpBtn','clearAnnBpBtn'].forEach(id => {
      document.getElementById(id).disabled = false;
    });
    notify('Loaded', 'success', 1200);
  } catch(e) {
    notify('Error: ' + e.message, 'error');
  } finally {
    loadBtn.textContent = 'Load Video'; loadBtn.disabled = false;
  }
}

function togglePlay() {
  if (!loaded) { notify('Load a video first', 'warning'); return; }
  if (playing) stopPlay();
  else {
    vid.playbackRate = speed; vid.play(); playing = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    document.getElementById('playBtn').className = 'btn btn-yellow';
  }
}
function stopPlay() {
  vid.pause(); playing = false;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').className = 'btn btn-green';
}
function seekF(n) {
  if (!loaded) return;
  srcFrame = Math.max(0, Math.min(totalSrcFrames-1, srcFrame+n));
  slider.value = srcFrame; vid.currentTime = srcFrame / srcFps; updateFrame();
}

async function skipUnprocessed() {
  const r = await fetch('/api/first-unprocessed');
  const d = await r.json();
  if (d.found) { vidIdx = d.index; updateInfoBar(); resetUI(); notify('Jumped', 'info', 800); }
  else notify('All processed!', 'success');
}

// ════════════════════════════════════════════════════════════════
// BBox timeline (source-fps space)
// ════════════════════════════════════════════════════════════════
function computeBaseRanges(id) {
  const frames = [...(idFrameSets[id]||new Set())].sort((a,b)=>a-b);
  if (!frames.length) return [];
  const ranges = [];
  let bs = frames[0], prev = frames[0];
  for (let j=1; j<=frames.length; j++) {
    if (j===frames.length || frames[j]-prev>2) {
      ranges.push({start:bs, end:prev});
      if (j<frames.length) bs = frames[j];
    }
    if (j<frames.length) prev = frames[j];
  }
  return ranges;
}

function computeSubSegs(id) {
  const base = computeBaseRanges(id);
  const bps  = (bpById[id]||[]).slice().sort((a,b)=>a-b);
  if (!bps.length) return base;
  const out = [];
  for (const r of base) {
    let cs = r.start;
    for (const bp of bps) {
      if (bp > cs && bp <= r.end) { out.push({start:cs,end:bp-1}); cs = bp; }
    }
    if (cs <= r.end) out.push({start:cs, end:r.end});
  }
  return out.filter(s => s.end >= s.start);
}

function subKey(s) { return `${s.start}-${s.end}`; }

function renderIdCards() {
  const c = document.getElementById('idCards');
  c.innerHTML = '';
  if (!detData) return;
  detData.unique_ids.forEach((id, i) => {
    const st    = idStates[id] || 'keep';
    const color = COLORS[i % COLORS.length];
    const stats = detData.per_id_stats[id] || {};
    const card  = document.createElement('div');
    card.className = `id-card ${st}${id===selectedBboxId?' selected':''}`;
    card.innerHTML = `<div class="dot" style="background:${color}"></div>
      ${st==='keep'?'✓':'✗'} ID ${id}
      <span style="font-weight:400;font-size:10px;color:var(--muted)">(${stats.frame_count||0}f)</span>`;
    card.onclick = () => { idStates[id] = idStates[id]==='keep'?'remove':'keep'; renderIdCards(); renderBboxTimeline(); };
    c.appendChild(card);
  });
}

function renderBboxTimeline() {
  const container = document.getElementById('tlRows');
  container.innerHTML = '';
  if (!detData || !totalSrcFrames) return;

  detData.unique_ids.forEach((id, i) => {
    const st    = idStates[id] || 'keep';
    const color = COLORS[i % COLORS.length];
    const dimmed = st !== 'keep';

    const row   = document.createElement('div'); row.className = 'tl-row';
    const label = document.createElement('div'); label.className = 'tl-label' + (id===selectedBboxId?' selected':'');
    label.style.color = dimmed ? 'var(--muted)' : color;
    label.textContent = `ID ${id}`;
    label.onclick = () => { selectedBboxId = id; renderIdCards(); renderBboxTimeline(); };

    const bar = document.createElement('div'); bar.className = 'tl-bar';

    const ph = document.createElement('div'); ph.className = 'tl-playhead bbox-playhead-el'; ph.style.left='0';
    bar.appendChild(ph);

    const subs   = computeSubSegs(id);
    const exSet  = exclById[id] || new Set();
    for (const sub of subs) {
      const left  = (sub.start / totalSrcFrames) * 100;
      const width = ((sub.end - sub.start + 1) / totalSrcFrames) * 100;
      const isEx  = exSet.has(subKey(sub));
      const blk   = document.createElement('div');
      blk.className = 'tl-block ' + (st==='keep' ? (isEx?'excl-sub':'kept-sub') : '');
      blk.style.left = `${left}%`;
      blk.style.width = `${Math.max(width, 0.15)}%`;
      blk.style.background = dimmed ? '#374151' : color;
      blk.style.opacity = dimmed ? '0.3' : '1';
      blk.title = `Frames ${sub.start}–${sub.end}${isEx?' (excluded)':''}`;
      if (st === 'keep') {
        blk.onclick = e => {
          e.stopPropagation();
          const k = subKey(sub);
          if (exSet.has(k)) exSet.delete(k); else exSet.add(k);
          exclById[id] = exSet;
          renderBboxTimeline();
        };
      }
      bar.appendChild(blk);
    }

    for (const bp of (bpById[id]||[])) {
      const m = document.createElement('div'); m.className = 'tl-bp';
      m.style.left = `${(bp/totalSrcFrames)*100}%`;
      bar.appendChild(m);
    }

    row.appendChild(label); row.appendChild(bar);
    container.appendChild(row);
  });
}

function addBboxBreakpoint() {
  if (!loaded || selectedBboxId === null) { notify('Select an ID first', 'warning'); return; }
  if (idStates[selectedBboxId] !== 'keep') { notify('ID is removed', 'warning'); return; }
  const bps = bpById[selectedBboxId] || [];
  if (bps.includes(srcFrame)) { notify('Breakpoint exists', 'warning', 1000); return; }
  bps.push(srcFrame); bps.sort((a,b)=>a-b);
  bpById[selectedBboxId] = bps;
  const exSet = exclById[selectedBboxId];
  if (exSet && exSet.size) {
    const newEx = new Set();
    for (const k of exSet) {
      const [s,e] = k.split('-').map(Number);
      if (srcFrame > s && srcFrame <= e) { newEx.add(`${s}-${srcFrame-1}`); newEx.add(`${srcFrame}-${e}`); }
      else newEx.add(k);
    }
    exclById[selectedBboxId] = newEx;
  }
  renderBboxTimeline();
  notify(`BBox BP at src frame ${srcFrame} for ID ${selectedBboxId}`, 'success', 1000);
}

function clearBboxBreakpoints() {
  if (selectedBboxId !== null) {
    bpById[selectedBboxId]   = [];
    exclById[selectedBboxId] = new Set();
    renderBboxTimeline();
    notify('Cleared bbox BPs', 'info', 800);
  }
}

function buildExcludedRanges() {
  const out = {};
  for (const id of Object.keys(exclById)) {
    const subs  = computeSubSegs(parseInt(id));
    const exSet = exclById[id];
    const ranges = [];
    for (const sub of subs) if (exSet.has(subKey(sub))) ranges.push([sub.start, sub.end]);
    if (ranges.length) out[id] = ranges;
  }
  return out;
}

// ════════════════════════════════════════════════════════════════
// Annotation panel (15-fps space)
// ════════════════════════════════════════════════════════════════
const SEG_COLORS = {
  'N/A':'#9ca3af','Crawling':'#4CAF50','Cruising':'#FF5722','Walking':'#2196F3',
  'Running':'#FFC107','Vehicle':'#9C27B0','Hands flapping':'#e91e63',
  'One hand flap':'#ff5722','Jumping':'#ff9800','Spinning':'#009688',
  'Rocking':'#3f51b5','Body tensing':'#795548',
};
function segColor(label) {
  if (SEG_COLORS[label]) return SEG_COLORS[label];
  let h = 0;
  for (let i=0; i<label.length; i++) h = label.charCodeAt(i)+((h<<5)-h);
  return `hsl(${Math.abs(h%360)},65%,45%)`;
}

function renderAnnPanel() {
  const scroll = document.getElementById('annRows');
  scroll.innerHTML = '';
  const cats = config.action_categories || {};
  for (const cat of Object.keys(cats)) {
    const row = document.createElement('div'); row.className = 'ann-row';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'ann-checkbox';
    cb.checked = cat === selectedAnnCat;
    cb.onchange = () => selectAnnCat(cat);

    const lbl = document.createElement('div');
    lbl.className = 'ann-label' + (cat===selectedAnnCat?' selected':'');
    lbl.id = `ann-label-${cat}`;
    lbl.textContent = cat.replace(/_/g,' ');
    lbl.onclick = () => selectAnnCat(cat);

    const barWrap = document.createElement('div'); barWrap.className = 'ann-bar-wrap';
    const ph = document.createElement('div');
    ph.className = 'ann-playhead ann-playhead-el'; ph.style.left = '0';
    const markers = document.createElement('div');
    markers.id = `ann-markers-${cat}`; markers.style.cssText='position:absolute;width:100%;height:100%;pointer-events:none;z-index:10';
    const segs = document.createElement('div');
    segs.id = `ann-segs-${cat}`; segs.style.cssText='position:relative;width:100%;height:100%';
    barWrap.appendChild(segs);
    barWrap.appendChild(markers);
    barWrap.appendChild(ph);

    row.appendChild(cb); row.appendChild(lbl); row.appendChild(barWrap);
    scroll.appendChild(row);
  }
  updateAnnLabels();
}

function selectAnnCat(cat) {
  selectedAnnCat = cat;
  const keys = Object.keys(config.action_categories||{});
  document.querySelectorAll('.ann-checkbox').forEach((cb, i) => { cb.checked = keys[i] === cat; });
  document.querySelectorAll('.ann-label').forEach((el, i) => { el.classList.toggle('selected', keys[i] === cat); });
}

function renderAllAnnSegments() {
  for (const cat of Object.keys(config.action_categories || {})) {
    renderAnnSegments(cat);
    renderAnnMarkers(cat);
  }
}

function renderAnnMarkers(cat) {
  const c = document.getElementById(`ann-markers-${cat}`);
  if (!c || !totalAnnFrames) return;
  c.innerHTML = '';
  for (const f of (annData[cat]?.breakpoints || [])) {
    const m = document.createElement('div'); m.className = 'ann-marker';
    m.style.left = `${(f/totalAnnFrames)*100}%`;
    c.appendChild(m);
  }
}

function renderAnnSegments(cat) {
  const c = document.getElementById(`ann-segs-${cat}`);
  if (!c || !totalAnnFrames) return;
  c.innerHTML = '';
  const segs = annData[cat]?.segments || [];
  for (const seg of segs) {
    const lbl = seg.label && seg.label.trim() ? seg.label : 'N/A';
    const left  = (seg.start_frame / totalAnnFrames) * 100;
    const width = ((seg.end_frame - seg.start_frame) / totalAnnFrames) * 100;
    const d = document.createElement('div');
    d.className = 'ann-segment' + (lbl==='N/A'?' na-seg':'');
    d.style.left  = `${left}%`;
    d.style.width = `${Math.max(width,0.1)}%`;
    d.style.backgroundColor = segColor(lbl);
    d.textContent = lbl;
    d.title = `${cat}: ${lbl} (${seg.start_frame}–${seg.end_frame})`;
    d.onclick = () => openLabelDialog(seg.start_frame, seg.end_frame, cat);
    c.appendChild(d);
  }
}

function addAnnBreakpoint() {
  if (!loaded) { notify('Load a video first', 'warning'); return; }
  if (!selectedAnnCat) { notify('Select an annotation category', 'warning'); return; }
  const annFrame = srcToAnn(srcFrame);
  const bps = annData[selectedAnnCat].breakpoints;
  if (bps.some(b => Math.abs(b-annFrame)<2)) { notify('BP too close to existing', 'warning', 1000); return; }
  bps.push(annFrame); bps.sort((a,b)=>a-b);
  splitAnnSegmentAt(annFrame, selectedAnnCat);
  renderAnnMarkers(selectedAnnCat);
  notify(`Ann BP at frame ${annFrame} (15fps) for ${selectedAnnCat}`, 'success', 1000);
}

function splitAnnSegmentAt(bpFrame, cat) {
  const segs = annData[cat].segments;
  for (let i=0; i<segs.length; i++) {
    const seg = segs[i];
    if (seg.start_frame < bpFrame && bpFrame < seg.end_frame) {
      segs.splice(i, 1,
        {start_frame: seg.start_frame, end_frame: bpFrame, label: seg.label},
        {start_frame: bpFrame, end_frame: seg.end_frame, label: seg.label}
      );
      renderAnnSegments(cat);
      return;
    }
  }
}

function clearAnnBreakpoints() {
  if (selectedAnnCat) {
    annData[selectedAnnCat].breakpoints = [];
    renderAnnSegments(selectedAnnCat);
    renderAnnMarkers(selectedAnnCat);
    notify('Cleared ann BPs', 'info', 800);
  }
}

// Label dialog
function openLabelDialog(sf, ef, cat) {
  currentSegment = {sf, ef, cat};
  document.getElementById('dialogTitle').textContent = `${cat.replace(/_/g,' ')}: ann-frame ${sf}–${ef}`;
  const dl = document.getElementById('dialogLabels');
  dl.innerHTML = '';
  const allLabels = (config.all_categories||{})[cat] || [];
  for (const lbl of allLabels) {
    const btn = document.createElement('button');
    btn.className = 'dlabel-btn'; btn.textContent = lbl;
    btn.onclick = () => setSegmentLabel(lbl);
    dl.appendChild(btn);
  }
  document.getElementById('labelDialog').classList.add('open');
}

function closeDialog() {
  document.getElementById('labelDialog').classList.remove('open');
  currentSegment = null;
}

function setSegmentLabel(newLabel) {
  if (!currentSegment) return;
  const {sf, ef, cat} = currentSegment;
  const segs = annData[cat].segments;
  for (let i=0; i<segs.length; i++) {
    if (segs[i].start_frame===sf && segs[i].end_frame===ef) {
      segs[i].label = newLabel; break;
    }
  }
  renderAnnSegments(cat);
  closeDialog();
}

// ════════════════════════════════════════════════════════════════
// Frame update
// ════════════════════════════════════════════════════════════════
function updateFrame() {
  frameLbl.textContent = `Frame: ${srcFrame} / ${totalSrcFrames-1}  (src ${srcFps.toFixed(1)} fps)`;
  const annFrame = srcToAnn(srcFrame);
  annFrameLbl.textContent = `Ann frame: ${annFrame} / ${totalAnnFrames-1}`;

  if (totalSrcFrames > 0) {
    const pct = (srcFrame / totalSrcFrames) * 100;
    document.querySelectorAll('.bbox-playhead-el').forEach(el => el.style.left = `${pct}%`);
  }
  if (totalAnnFrames > 0) {
    const pctA = (annFrame / totalAnnFrames) * 100;
    document.querySelectorAll('.ann-playhead-el').forEach(el => el.style.left = `${pctA}%`);
  }

  // Frame details
  const fd = (detData?.per_frame||{})[srcFrame];
  const el = document.getElementById('frameDets');
  if (!fd || !fd.length) { el.textContent = `Src frame ${srcFrame}: no detections`; return; }
  el.innerHTML = `<span style="color:var(--muted)">Frame ${srcFrame}:</span> ` + fd.map(d => {
    const st = idStates[d.obj_id] || 'keep';
    const c  = st==='keep' ? 'var(--green)' : 'var(--red)';
    return `<span style="color:${c};font-weight:700">${st==='keep'?'✓':'✗'} ID:${d.obj_id}</span> [${d.x1},${d.y1},${d.x2},${d.y2}] s=${d.score}`;
  }).join(' &nbsp;|&nbsp; ');
}

// ════════════════════════════════════════════════════════════════
// Save
// ════════════════════════════════════════════════════════════════
async function saveAll() {
  if (!loaded) { notify('No video loaded', 'warning'); return; }

  const keepIds   = Object.entries(idStates).filter(([,v])=>v==='keep').map(([k])=>parseInt(k));
  const removeIds = Object.entries(idStates).filter(([,v])=>v==='remove').map(([k])=>parseInt(k));

  if (keepIds.length === 0 && (detData?.unique_ids?.length||0) > 0) {
    notify('Mark at least one ID to keep!', 'error'); return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = 'Saving…'; saveBtn.disabled = true;

  try {
    const payload = {
      video_index:     vidIdx,
      total_frames:    totalSrcFrames,   // src-fps (for bbox filtering)
      ann_total_frames: totalAnnFrames,  // 15-fps (for annotation CSV)
      keep_ids:        keepIds,
      remove_ids:      removeIds,
      excluded_ranges: buildExcludedRanges(),
      remap_to:        1,
      categories:      annData,
    };

    const r = await fetch('/api/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();

    if (d.success) {
      videos[vidIdx].status = 1;
      updateInfoBar();
      notify(`Saved! ${d.bbox?.kept_frames||0} bbox frames · ${d.ann_rows||0} ann rows`, 'success', 2500);
    } else {
      notify('Save failed', 'error');
    }
  } catch(e) {
    notify('Error: ' + e.message, 'error');
  } finally {
    saveBtn.textContent = '💾 Save All'; saveBtn.disabled = false;
  }
}

init();
